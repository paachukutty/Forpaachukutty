<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>For My Love ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial, sans-serif;
    background:linear-gradient(to bottom, #050816, #0d1b2a);
    position:relative;
}

/* Stars */
.stars{
    position:absolute;
    width:100%;
    height:100%;
    background:url('https://i.imgur.com/YKY28eT.png');
    animation:moveStars 100s linear infinite;
    opacity:0.6;
}

@keyframes moveStars{
    from{
        background-position:0 0;
    }
    to{
        background-position:10000px 5000px;
    }
}

/* Hearts */
.heart{
    position:absolute;
    color:#ff4d6d;
    animation:floatUp 8s linear infinite;
    font-size:20px;
}

@keyframes floatUp{
    0%{
        transform:translateY(100vh) scale(0.5);
        opacity:0;
    }
    20%{
        opacity:1;
    }
    100%{
        transform:translateY(-120vh) scale(1.2);
        opacity:0;
    }
}

/* Main Box */
.container{
    position:relative;
    z-index:2;
    text-align:center;
}

.open-btn{
    padding:18px 35px;
    border:none;
    border-radius:50px;
    background:#ff4d6d;
    color:white;
    font-size:20px;
    cursor:pointer;
    box-shadow:0 0 25px #ff4d6d;
    transition:0.3s;
    animation:pulse 2s infinite;
}

.open-btn:hover{
    transform:scale(1.08);
}

@keyframes pulse{
    0%{
        box-shadow:0 0 15px #ff4d6d;
    }
    50%{
        box-shadow:0 0 35px #ff4d6d;
    }
    100%{
        box-shadow:0 0 15px #ff4d6d;
    }
}

/* Popup */
.popup{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%) scale(0);
    width:90%;
    max-width:400px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,0.2);
    border-radius:25px;
    padding:35px;
    text-align:center;
    color:white;
    z-index:10;
    transition:0.4s ease;
}

.popup.show{
    transform:translate(-50%, -50%) scale(1);
}

.popup h1{
    margin-bottom:15px;
    font-size:30px;
}

.popup p{
    line-height:1.8;
    font-size:18px;
}

.close-btn{
    margin-top:20px;
    padding:10px 25px;
    border:none;
    border-radius:30px;
    background:#ff4d6d;
    color:white;
    cursor:pointer;
    font-size:16px;
}

/* Typing Animation */
.typing{
    overflow:hidden;
    border-right:3px solid white;
    white-space:nowrap;
    width:0;
    animation:typing 4s steps(40,end) forwards,
              blink 0.7s infinite;
}

@keyframes typing{
    from{
        width:0;
    }
    to{
        width:100%;
    }
}

@keyframes blink{
    50%{
        border-color:transparent;
    }
}
</style>
</head>

<body>

<div class="stars"></div>

<div class="container">
    <button class="open-btn" onclick="openPopup()">
        Open Carefully 💌
    </button>
</div>

<div class="popup" id="popup">
    <h1>❤️ Hey Beautiful ❤️</h1>

    <p class="typing">
        No matter what happens in life...
    </p>

    <br><br>

    <p>
        You are still my favorite person,  
        my peace, my happiness, and  
        the best thing that ever happened to me 🌙✨
    </p>

    <br>

    <p>
        I love you endlessly ❤️
    </p>

    <button class="close-btn" onclick="closePopup()">
        Close 💖
    </button>
</div>

<script>
function openPopup(){
    document.getElementById("popup").classList.add("show");
}

function closePopup(){
    document.getElementById("popup").classList.remove("show");
}

/* Floating Hearts */
function createHeart(){
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤️";

    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (Math.random() * 20 + 15) + "px";
    heart.style.animationDuration = (Math.random() * 3 + 5) + "s";

    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 8000);
}

setInterval(createHeart, 400);
</script>

</body>
</html>
